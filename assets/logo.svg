<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="480" rx="24" fill="url(#bg)"/>

  <!-- Subtle circuit lines -->
  <g stroke="#2a2a5a" stroke-width="1" opacity="0.3">
    <line x1="30" y1="120" x2="80" y2="120"/>
    <line x1="320" y1="120" x2="370" y2="120"/>
    <line x1="30" y1="300" x2="70" y2="300"/>
    <line x1="330" y1="300" x2="370" y2="300"/>
    <circle cx="80" cy="120" r="2" fill="#2a2a5a"/>
    <circle cx="320" cy="120" r="2" fill="#2a2a5a"/>
    <circle cx="70" cy="300" r="2" fill="#2a2a5a"/>
    <circle cx="330" cy="300" r="2" fill="#2a2a5a"/>
  </g>

  <!-- ===== Crane Character ===== -->
  <g transform="translate(200, 210)">

    <!-- Shadow -->
    <ellipse cx="0" cy="145" rx="50" ry="8" fill="#000" opacity="0.2"/>

    <!-- Legs -->
    <line x1="-12" y1="95" x2="-15" y2="140" stroke="#f4a261" stroke-width="4" stroke-linecap="round"/>
    <line x1="12" y1="95" x2="15" y2="140" stroke="#f4a261" stroke-width="4" stroke-linecap="round"/>
    <!-- Shoes (cute little boots) -->
    <ellipse cx="-18" cy="143" rx="12" ry="6" fill="#e94560"/>
    <ellipse cx="18" cy="143" rx="12" ry="6" fill="#e94560"/>
    <ellipse cx="-18" cy="141" rx="12" ry="4" fill="#ff6b81"/>
    <ellipse cx="18" cy="141" rx="12" ry="4" fill="#ff6b81"/>

    <!-- Body -->
    <ellipse cx="0" cy="55" rx="48" ry="45" fill="#fafafa"/>
    <ellipse cx="0" cy="55" rx="44" ry="41" fill="#fff"/>

    <!-- Lab coat / hoodie -->
    <path d="M -48,55 Q -50,20 -35,10 L -20,5 Q 0,0 20,5 L 35,10 Q 50,20 48,55" fill="none" stroke="#ddd" stroke-width="2"/>
    <!-- Hoodie front zip line -->
    <line x1="0" y1="15" x2="0" y2="95" stroke="#ddd" stroke-width="1.5" stroke-dasharray="4,3"/>
    <!-- Pocket -->
    <rect x="-25" y="60" width="20" height="14" rx="3" fill="none" stroke="#ccc" stroke-width="1.2"/>
    <!-- Tiny chip in pocket -->
    <rect x="-21" y="63" width="8" height="6" rx="1" fill="#e94560" opacity="0.7"/>
    <line x1="-17" y1="63" x2="-17" y2="60" stroke="#e94560" stroke-width="0.8" opacity="0.5"/>

    <!-- Wings (as arms, slightly out) -->
    <!-- Left wing/arm -->
    <path d="M -42,35 Q -68,25 -72,45 Q -70,55 -55,50 Q -48,48 -44,50" fill="#f0f0f0" stroke="#ccc" stroke-width="1.5"/>
    <!-- Left hand holding tiny laptop -->
    <rect x="-75" y="38" width="16" height="11" rx="2" fill="#333" stroke="#555" stroke-width="1"/>
    <rect x="-74" y="39" width="14" height="8" rx="1" fill="#4a90d9" opacity="0.7"/>
    <rect x="-72" y="40" width="3" height="1.5" rx="0.5" fill="#7bc67e" opacity="0.8"/>
    <rect x="-68" y="40" width="5" height="1.5" rx="0.5" fill="#e94560" opacity="0.8"/>

    <!-- Right wing/arm (waving) -->
    <path d="M 42,35 Q 60,15 70,20 Q 72,25 65,35 Q 55,42 44,45" fill="#f0f0f0" stroke="#ccc" stroke-width="1.5"/>

    <!-- Tail feathers (stylized, peeking behind) -->
    <path d="M 30,70 Q 55,50 60,35 Q 58,45 50,60 Z" fill="#333" opacity="0.6"/>
    <path d="M 28,75 Q 50,58 55,45 Q 53,55 45,68 Z" fill="#444" opacity="0.5"/>

    <!-- Neck -->
    <path d="M -8,10 Q -12,-25 -5,-55 Q -2,-60 2,-55 Q -5,-30 0,5" fill="#fff" stroke="#ddd" stroke-width="1.5"/>

    <!-- Scarf -->
    <path d="M -15,0 Q -5,-5 15,2 Q 20,5 18,10 Q 5,5 -10,8 Q -18,10 -15,0" fill="#e94560"/>
    <path d="M 15,2 Q 22,15 18,28 Q 16,25 17,12" fill="#e94560"/>
    <circle cx="0" cy="2" r="2" fill="#c0392b"/>

    <!-- Head -->
    <ellipse cx="-3" cy="-62" rx="22" ry="20" fill="#fff" stroke="#eee" stroke-width="1"/>

    <!-- Red crown (iconic crane feature) -->
    <ellipse cx="-1" cy="-82" rx="8" ry="5" fill="#e94560"/>
    <ellipse cx="-1" cy="-83" rx="6" ry="3.5" fill="#ff6b81"/>

    <!-- Eyes (big, cute, anime-style) -->
    <!-- Left eye -->
    <ellipse cx="-12" cy="-65" rx="7" ry="8" fill="#1a1a2e"/>
    <ellipse cx="-12" cy="-65" rx="6" ry="7" fill="#222244"/>
    <circle cx="-14" cy="-67" r="2.5" fill="white"/>
    <circle cx="-10" cy="-63" r="1.2" fill="white" opacity="0.6"/>
    <!-- Right eye -->
    <ellipse cx="8" cy="-65" rx="7" ry="8" fill="#1a1a2e"/>
    <ellipse cx="8" cy="-65" rx="6" ry="7" fill="#222244"/>
    <circle cx="6" cy="-67" r="2.5" fill="white"/>
    <circle cx="10" cy="-63" r="1.2" fill="white" opacity="0.6"/>

    <!-- Blush -->
    <ellipse cx="-20" cy="-57" rx="5" ry="3" fill="#ffb3b3" opacity="0.5"/>
    <ellipse cx="16" cy="-57" rx="5" ry="3" fill="#ffb3b3" opacity="0.5"/>

    <!-- Beak (small, cute) -->
    <path d="M -5,-55 L -12,-52 L -5,-50 Z" fill="#f4a261" stroke="#e8963f" stroke-width="0.8"/>

    <!-- Tiny headphone/earpiece (techy) -->
    <path d="M 17,-68 Q 25,-70 26,-62 Q 25,-58 22,-58" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round"/>
    <circle cx="22" cy="-58" r="3" fill="#444"/>
    <circle cx="22" cy="-58" r="2" fill="#e94560"/>

    <!-- Hair tuft -->
    <path d="M -5,-80 Q -8,-92 -2,-90 Q 2,-95 5,-85 Q 3,-82 0,-80" fill="#ddd" stroke="#ccc" stroke-width="0.8"/>
  </g>

  <!-- Neural network sparkles around character -->
  <g fill="#e94560" opacity="0.6">
    <circle cx="100" cy="130" r="3"/>
    <circle cx="85" cy="155" r="2"/>
    <circle cx="115" cy="160" r="2.5"/>
    <circle cx="300" cy="140" r="3"/>
    <circle cx="315" cy="165" r="2"/>
    <circle cx="285" cy="158" r="2.5"/>
  </g>
  <g stroke="#e94560" stroke-width="0.8" opacity="0.3">
    <line x1="100" y1="130" x2="85" y2="155"/>
    <line x1="100" y1="130" x2="115" y2="160"/>
    <line x1="85" y1="155" x2="115" y2="160"/>
    <line x1="300" y1="140" x2="315" y2="165"/>
    <line x1="300" y1="140" x2="285" y2="158"/>
    <line x1="315" y1="165" x2="285" y2="158"/>
  </g>

  <!-- Title -->
  <text x="200" y="410" text-anchor="middle" font-family="'Rounded Mplus 1c', 'SF Rounded', system-ui, sans-serif" font-size="42" font-weight="800" fill="#f5f5f5" letter-spacing="8">CRANE</text>

  <!-- Subtitle -->
  <text x="200" y="438" text-anchor="middle" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#888" letter-spacing="1.5">Compiled Runtime for Apple Neural Engine</text>

  <!-- Version badge -->
  <rect x="160" y="448" width="80" height="18" rx="9" fill="#e94560" opacity="0.15"/>
  <text x="200" y="461" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="9" fill="#e94560" opacity="0.8">v0.1.0</text>
</svg>
