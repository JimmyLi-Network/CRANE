<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#dce6f9"/>
    </radialGradient>
    <radialGradient id="cheek_l" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb3b3" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffb3b3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cheek_r" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb3b3" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffb3b3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="crown_glow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="70%" stop-color="#cc2222"/>
      <stop offset="100%" stop-color="#aa1111"/>
    </radialGradient>
    <filter id="soft_shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="2" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#bg)" stroke="#c5d3e8" stroke-width="2"/>

  <g filter="url(#soft_shadow)">
    <!-- Neck feathers -->
    <ellipse cx="200" cy="340" rx="55" ry="45" fill="#f5f5f5"/>
    <ellipse cx="200" cy="330" rx="50" ry="40" fill="#fafafa"/>

    <!-- Main head shape -->
    <ellipse cx="200" cy="195" rx="105" ry="115" fill="#fefefe"/>
    <ellipse cx="185" cy="165" rx="70" ry="60" fill="#ffffff" opacity="0.6"/>

    <!-- Red crown -->
    <ellipse cx="200" cy="100" rx="32" ry="22" fill="url(#crown_glow)"/>
    <ellipse cx="200" cy="96" rx="24" ry="14" fill="#ff5555" opacity="0.5"/>

    <!-- Black forehead -->
    <path d="M145 135 Q155 105 200 95 Q245 105 255 135 Q240 125 200 118 Q160 125 145 135Z"
          fill="#2a2a2a" opacity="0.85"/>

    <!-- Left eye -->
    <ellipse cx="163" cy="185" rx="22" ry="24" fill="#1a1a1a"/>
    <ellipse cx="163" cy="185" rx="19" ry="21" fill="#2d2d2d"/>
    <ellipse cx="158" cy="178" rx="8" ry="9" fill="#ffffff"/>
    <ellipse cx="170" cy="190" rx="4" ry="4.5" fill="#ffffff" opacity="0.7"/>
    <circle cx="155" cy="175" r="3" fill="#ffffff"/>

    <!-- Right eye -->
    <ellipse cx="237" cy="185" rx="22" ry="24" fill="#1a1a1a"/>
    <ellipse cx="237" cy="185" rx="19" ry="21" fill="#2d2d2d"/>
    <ellipse cx="232" cy="178" rx="8" ry="9" fill="#ffffff"/>
    <ellipse cx="244" cy="190" rx="4" ry="4.5" fill="#ffffff" opacity="0.7"/>
    <circle cx="229" cy="175" r="3" fill="#ffffff"/>

    <!-- Eyelashes -->
    <path d="M142 172 Q145 167 150 170" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
    <path d="M258 172 Q255 167 250 170" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>

    <!-- Beak -->
    <path d="M190 215 L200 210 L210 215 L230 235 Q220 245 200 248 Q180 245 170 235Z"
          fill="#f5a623"/>
    <path d="M190 215 L200 210 L210 215 L220 228 Q210 232 200 233 Q190 232 180 228Z"
          fill="#f7b84e"/>
    <path d="M175 232 Q200 238 225 232" stroke="#d4891a" stroke-width="1" fill="none"/>
    <circle cx="193" cy="225" r="1.5" fill="#d4891a"/>
    <circle cx="207" cy="225" r="1.5" fill="#d4891a"/>

    <!-- Cheek blush -->
    <ellipse cx="135" cy="215" rx="18" ry="12" fill="url(#cheek_l)"/>
    <ellipse cx="265" cy="215" rx="18" ry="12" fill="url(#cheek_r)"/>

    <!-- Head feather tufts -->
    <path d="M175 88 Q180 70 190 78" stroke="#e8e8e8" stroke-width="2" fill="none"/>
    <path d="M210 78 Q220 70 225 88" stroke="#e8e8e8" stroke-width="2" fill="none"/>

    <!-- Black neck stripe -->
    <path d="M160 280 Q165 260 175 250 Q200 240 225 250 Q235 260 240 280
             Q230 290 200 295 Q170 290 160 280Z" fill="#2a2a2a" opacity="0.8"/>
  </g>

  <!-- Sparkles -->
  <g fill="#c5d3e8" opacity="0.6">
    <polygon points="320,120 323,127 330,127 324,132 326,139 320,135 314,139 316,132 310,127 317,127" transform="scale(0.6) translate(200,80)"/>
    <polygon points="320,120 323,127 330,127 324,132 326,139 320,135 314,139 316,132 310,127 317,127" transform="scale(0.4) translate(180,320)"/>
    <polygon points="320,120 323,127 330,127 324,132 326,139 320,135 314,139 316,132 310,127 317,127" transform="scale(0.5) translate(580,200)"/>
  </g>
</svg>
