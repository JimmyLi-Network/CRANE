<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background circle -->
  <circle cx="200" cy="200" r="185" fill="#1a1a2e" stroke="#e94560" stroke-width="3"/>

  <!-- Chip/circuit pattern background -->
  <g stroke="#2a2a4a" stroke-width="1" fill="none" opacity="0.5">
    <line x1="50" y1="200" x2="120" y2="200"/>
    <line x1="280" y1="200" x2="350" y2="200"/>
    <line x1="200" y1="50" x2="200" y2="100"/>
    <line x1="200" y1="300" x2="200" y2="350"/>
    <rect x="130" y="130" width="140" height="140" rx="10"/>
    <circle cx="130" cy="130" r="3" fill="#2a2a4a"/>
    <circle cx="270" cy="130" r="3" fill="#2a2a4a"/>
    <circle cx="130" cy="270" r="3" fill="#2a2a4a"/>
    <circle cx="270" cy="270" r="3" fill="#2a2a4a"/>
  </g>

  <!-- Crane body -->
  <g transform="translate(200, 200)">
    <!-- Body -->
    <ellipse cx="0" cy="20" rx="45" ry="30" fill="#f5f5f5" stroke="#333" stroke-width="2"/>

    <!-- Wing -->
    <path d="M -10,5 Q -55,-20 -65,15 Q -50,0 -30,5 Z" fill="#e8e8e8" stroke="#333" stroke-width="1.5"/>
    <path d="M -10,10 Q -50,-10 -58,20 Q -45,8 -25,10 Z" fill="#d0d0d0" stroke="#333" stroke-width="1"/>

    <!-- Tail feathers -->
    <path d="M 35,10 Q 65,-15 75,-10 Q 60,0 45,10 Z" fill="#333" stroke="#222" stroke-width="1"/>
    <path d="M 35,15 Q 60,-5 70,0 Q 55,8 42,15 Z" fill="#444" stroke="#222" stroke-width="1"/>

    <!-- Neck -->
    <path d="M -15,0 Q -25,-40 -15,-75 Q -10,-85 -5,-80 Q -15,-50 -5,-5" fill="#f5f5f5" stroke="#333" stroke-width="2" fill-opacity="0.9"/>

    <!-- Head -->
    <circle cx="-18" cy="-78" r="12" fill="#f5f5f5" stroke="#333" stroke-width="2"/>

    <!-- Eye -->
    <circle cx="-22" cy="-80" r="3.5" fill="#1a1a2e"/>
    <circle cx="-23" cy="-81" r="1.2" fill="white"/>

    <!-- Red crown (crane signature) -->
    <ellipse cx="-16" cy="-88" rx="6" ry="4" fill="#e94560"/>

    <!-- Beak -->
    <path d="M -28,-76 L -48,-72 L -28,-74 Z" fill="#f4a261" stroke="#333" stroke-width="1"/>

    <!-- Legs -->
    <line x1="5" y1="48" x2="0" y2="80" stroke="#f4a261" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="15" y1="48" x2="20" y2="80" stroke="#f4a261" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Feet -->
    <path d="M -5,80 L 0,80 L 5,78" stroke="#f4a261" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 15,80 L 20,80 L 25,78" stroke="#f4a261" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Neural sparkle on crane -->
  <g fill="#e94560" opacity="0.8">
    <circle cx="165" cy="155" r="2"/>
    <circle cx="175" cy="140" r="1.5"/>
    <circle cx="155" cy="145" r="1.5"/>
  </g>
  <g stroke="#e94560" stroke-width="0.8" opacity="0.4">
    <line x1="165" y1="155" x2="175" y2="140"/>
    <line x1="165" y1="155" x2="155" y2="145"/>
  </g>

  <!-- Text: CRANE -->
  <text x="200" y="340" text-anchor="middle" font-family="SF Mono, Menlo, Consolas, monospace" font-size="36" font-weight="bold" fill="#f5f5f5" letter-spacing="6">CRANE</text>

  <!-- Subtitle -->
  <text x="200" y="365" text-anchor="middle" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9" fill="#888" letter-spacing="1">Compiled Runtime for Apple Neural Engine</text>
</svg>
